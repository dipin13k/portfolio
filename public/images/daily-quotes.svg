<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03045E"/>
      <stop offset="50%" style="stop-color:#023E8A"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Big quote marks -->
  <text x="80" y="200" font-family="Georgia,serif" font-size="160" fill="#00B4D8" opacity="0.3">"</text>
  <!-- Quote text -->
  <text x="400" y="180" font-family="Georgia,serif" font-size="22" fill="white" text-anchor="middle" opacity="0.95">The secret of getting ahead is</text>
  <text x="400" y="215" font-family="Georgia,serif" font-size="22" fill="white" text-anchor="middle" opacity="0.95">getting started.</text>
  <text x="400" y="265" font-family="Georgia,serif" font-size="16" fill="#90E0EF" text-anchor="middle" opacity="0.75">— Mark Twain</text>
  <!-- Divider -->
  <line x1="300" y1="290" x2="500" y2="290" stroke="#00B4D8" stroke-width="1" opacity="0.4"/>
  <!-- GitHub Actions badge -->
  <rect x="280" y="308" width="240" height="32" rx="6" fill="#161B22" stroke="#2088FF" stroke-width="1.5"/>
  <text x="400" y="329" font-family="monospace" font-size="13" fill="#2088FF" text-anchor="middle">⚡ Automated via GitHub Actions</text>
  <!-- Calendar icon -->
  <rect x="330" y="350" width="140" height="20" rx="4" fill="#0D1117" opacity="0.6"/>
  <text x="400" y="365" font-family="monospace" font-size="12" fill="#8B949E" text-anchor="middle">New quote every day</text>
  <!-- Text -->
  <text x="400" y="445" font-family="monospace" font-size="28" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">Daily Quotes</text>
  <text x="400" y="475" font-family="monospace" font-size="16" fill="#90E0EF" text-anchor="middle" opacity="0.7">Automated with GitHub Actions</text>
</svg>
